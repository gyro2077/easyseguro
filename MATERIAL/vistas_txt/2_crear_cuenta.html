<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Crear Cuenta - Paso 1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

    <link

        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#dfe3e7",
                        "surface-container-high": "#eae7e7",
                        "surface-container": "#f0eded",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#2f3437",
                        "primary-container": "#003366",
                        "on-secondary-fixed": "#221b00",
                        "on-secondary-fixed-variant": "#544600",
                        "inverse-primary": "#a7c8ff",
                        "surface-bright": "#fcf9f8",
                        "on-error": "#ffffff",
                        "surface-tint": "#3a5f94",
                        "primary": "#001e40",
                        "inverse-on-surface": "#f3f0ef",
                        "on-tertiary-container": "#989ca0",
                        "secondary-fixed": "#ffe16d",
                        "on-tertiary-fixed": "#171c1f",
                        "surface-variant": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#43474b",
                        "secondary-fixed-dim": "#e9c400",
                        "surface": "#fcf9f8",
                        "primary-fixed-dim": "#a7c8ff",
                        "surface-container-low": "#f6f3f2",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c3c6d1",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#799dd6",
                        "outline": "#737780",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#1a1f22",
                        "on-background": "#1c1b1b",
                        "primary-fixed": "#d5e3ff",
                        "on-secondary-container": "#6e5c00",
                        "on-primary-fixed-variant": "#1f477b",
                        "error": "#ba1a1a",
                        "on-surface": "#1c1b1b",
                        "tertiary-fixed-dim": "#c3c7cb",
                        "surface-dim": "#dcd9d9",
                        "surface-container-highest": "#e5e2e1",
                        "on-primary-fixed": "#001b3c",
                        "inverse-surface": "#313030",
                        "background": "#fcf9f8",
                        "secondary-container": "#fcd400",
                        "on-surface-variant": "#43474f",
                        "on-secondary": "#ffffff",
                        "secondary": "#705d00",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    "spacing": {

                        "xs": "4px",

                        "container-margin": "20px"

                    "fontFamily": {
                        "label-md": [
                            "Inter"
                        ],
                        "display-lg": [
                            "Hanken Grotesk"

                        "display-lg-mobile": [

    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>

<body class="bg-background text-on-background antialiased font-body-md text-body-md min-h-screen flex flex-col">
    <!-- Header Section -->
    <header class="w-full bg-primary text-on-primary pt-8 pb-4 px-container-margin sticky top-0 z-50 shadow-md">
        <div class="flex items-center justify-between mb-4">
            <button aria-label="Volver"
                class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-primary-container transition-colors">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
            </button>
            <h1 class="font-headline-sm text-headline-sm-mobile md:text-headline-sm font-bold">Crear Cuenta</h1>
            <div class="w-10 h-10"></div> <!-- Placeholder for balance -->
        </div>
        <!-- Progress Bar -->
        <div class="w-full">
            <div class="flex justify-between items-center mb-sm">
                <span class="font-label-sm text-label-sm text-on-primary-container">Paso 1 de 3</span>
                <span class="font-label-sm text-label-sm text-on-primary-container">33%</span>
            </div>
            <div class="h-2 w-full bg-primary-container rounded-full overflow-hidden">
                <div class="h-full bg-secondary-container w-1/3 rounded-full transition-all duration-300"></div>
            </div>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="flex-grow px-container-margin py-lg flex flex-col items-center">
        <div
            class="w-full max-w-md w-full bg-surface-container-lowest rounded-2xl shadow-[0px_4px_20px_rgba(0,51,102,0.08)] p-md md:p-lg border border-outline-variant/30 relative overflow-hidden">
            <!-- Decorative Gradient Blob -->
            <div
                class="absolute -top-16 -right-16 w-32 h-32 bg-secondary-container/10 rounded-full blur-2xl pointer-events-none">
            </div>
            <div class="mb-lg">
                <h2 class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary mb-sm">Tus Datos
                    Personales</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Ingresa tu información para comenzar el
                    registro.</p>
            </div>
            <form class="flex flex-col gap-stack-gap">
                <!-- Nombre y Apellido (Row on Desktop, Stack on Mobile) -->
                <div class="flex flex-col md:flex-row gap-stack-gap">
                    <div class="flex-1 flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface" for="nombre">Nombre</label>
                        <div class="relative">
                            <input
                                class="w-full h-12 px-4 rounded-lg border-2 border-outline-variant bg-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50 font-body-md text-body-md"
                                id="nombre" placeholder="Ej. Juan" type="text" />
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col gap-xs">
                        <label class="font-label-md text-label-md text-on-surface" for="apellido">Apellido</label>
                        <div class="relative">
                            <input
                                class="w-full h-12 px-4 rounded-lg border-2 border-outline-variant bg-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50 font-body-md text-body-md"
                                id="apellido" placeholder="Ej. Pérez" type="text" />
                        </div>
                    </div>
                </div>
                <!-- Correo Electrónico -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface" for="correo">Correo electrónico</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">mail</span>
                        <input
                            class="w-full h-12 pl-12 pr-4 rounded-lg border-2 border-outline-variant bg-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50 font-body-md text-body-md"
                            id="correo" placeholder="juan.perez@ejemplo.com" type="email" />
                    </div>
                </div>
                <!-- Teléfono -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface" for="telefono">Teléfono celular</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">call</span>
                        <input
                            class="w-full h-12 pl-12 pr-4 rounded-lg border-2 border-outline-variant bg-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50 font-body-md text-body-md"
                            id="telefono" placeholder="300 123 4567" type="tel" />
                    </div>
                </div>
                <!-- Número de Cédula -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface" for="cedula">Número de cédula</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">badge</span>
                        <input
                            class="w-full h-12 pl-12 pr-4 rounded-lg border-2 border-outline-variant bg-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors placeholder:text-outline/50 font-body-md text-body-md"
                            id="cedula" placeholder="Ingresa tu documento" type="text" />
                    </div>
                </div>
                <!-- Ciudad -->
                <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface" for="ciudad">Ciudad de residencia</label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">location_on</span>
                        <select
                            class="w-full h-12 pl-12 pr-10 rounded-lg border-2 border-outline-variant bg-surface focus:border-primary focus:ring-0 focus:outline-none transition-colors appearance-none font-body-md text-body-md text-on-surface"
                            id="ciudad">
                            <option class="text-outline/50" disabled="" selected="" value="">Selecciona tu ciudad
                            </option>
                            <option value="bogota">Bogotá</option>
                            <option value="medellin">Medellín</option>
                            <option value="cali">Cali</option>
                            <option value="barranquilla">Barranquilla</option>
                        </select>
                        <span
                            class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none">expand_more</span>
                    </div>
                </div>
                <!-- Action Area -->
                <div class="mt-lg pt-md border-t border-outline-variant/30 flex flex-col items-center w-full">
                    <button
                        class="w-full h-12 bg-secondary-container text-on-secondary-container font-label-md text-label-md rounded-full shadow-[0px_4px_20px_rgba(0,51,102,0.08)] hover:bg-secondary-fixed-dim hover:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2"
                        type="button">
                        Registrarme
                        <span class="material-symbols-outlined text-[20px]"
                            style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
                    </button>
                    <p class="mt-sm font-label-sm text-label-sm text-on-surface-variant text-center max-w-[280px]">
                        Al registrarte, aceptas nuestros <a class="text-primary underline hover:text-primary-container"
                            href="#">Términos y Condiciones</a>.
                    </p>
                </div>
            </form>
        </div>
    </main>
    <!-- Intentionally omitting BottomNavBar as this is a linear/transactional flow per constraints -->
    <script>
        // Simple micro-interaction for input focus states beyond CSS
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('focus', function () {
                const icon = this.parentElement.querySelector('.material-symbols-outlined:not(.pointer-events-none)');
                if (icon) {
                    icon.classList.remove('text-outline');
                    icon.classList.add('text-primary');
                    icon.style.fontVariationSettings = "'FILL' 1";
                }
            });
            element.addEventListener('blur', function () {
                const icon = this.parentElement.querySelector('.material-symbols-outlined:not(.pointer-events-none)');
                if (icon) {
                    icon.classList.remove('text-primary');
                    icon.classList.add('text-outline');
                    icon.style.fontVariationSettings = "'FILL' 0";
                }
            });
        });
    </script>
</body>

</html>
