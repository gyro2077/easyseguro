<body
    class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container">
    <!-- 
      Semantic Shell Suppression Rule Applied:
      This is a linear "Success/Confirmation" splash screen.
      TopAppBar and BottomNavBar are MANDATORY SUPPRESSED to prioritize the focused canvas.
    -->
    <main class="flex-1 flex flex-col max-w-md mx-auto w-full relative overflow-hidden bg-surface-container-lowest">
        <!-- Top Celebration Area -->
        <div
            class="flex-1 bg-primary flex flex-col items-center justify-center px-container-margin py-12 text-on-primary rounded-b-[40px] relative z-10 shadow-lg">
            <!-- Atmospheric Pattern (Subtle) -->
            <div
                class="absolute inset-0 opacity-[0.03] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent pointer-events-none">
            </div>
            <!-- Checkmark -->
            <div
                class="w-24 h-24 bg-surface-container-lowest rounded-full flex items-center justify-center mb-6 shadow-md animate-[bounce_1s_ease-in-out_1]">
                <span class="material-symbols-outlined text-[48px] text-primary"
                    style="font-variation-settings: 'FILL' 1;">check</span>
            </div>
            <h1 class="text-display-lg-mobile font-display-lg-mobile mb-2 tracking-tight">¡Listo!</h1>
            <p class="text-body-lg font-body-lg text-primary-fixed-dim">Tu seguro está activo</p>
        </div>
        <!-- Details & Actions Canvas -->
        <div class="px-container-margin pt-10 pb-8 flex flex-col flex-1 relative z-20">
            <!-- Summary Card (Level 1 Elevation) -->
            <div
                class="bg-surface-container-lowest rounded-[24px] p-6 shadow-[0px_4px_20px_rgba(0,51,102,0.08)] mb-auto border border-outline-variant/40">
                <div class="flex items-center gap-2 mb-5">
                    <span class="text-2xl">🛡️</span>
                    <h2 class="text-headline-sm font-headline-sm text-primary">Vida Protegida</h2>
                </div>
                <div class="space-y-stack-gap text-label-md font-label-md text-on-surface-variant">
                    <div class="flex justify-between items-center py-1 border-b border-surface-container-high/50">
                        <span class="text-on-surface-variant/80 font-normal">N° de póliza</span>
                        <span class="text-on-surface">VP-2025-004821</span>
                    </div>
                    <div class="flex justify-between items-center py-1 border-b border-surface-container-high/50">
                        <span class="text-on-surface-variant/80 font-normal">Prima mensual</span>
                        <span class="text-on-surface">$10.90</span>
                    </div>
                    <div class="flex justify-between items-center py-1 border-b border-surface-container-high/50">
                        <span class="text-on-surface-variant/80 font-normal">Cobertura</span>
                        <span class="text-on-surface">$30,000</span>
                    </div>
                    <div
                        class="flex justify-between items-center py-2 mt-2 bg-surface-container-low -mx-4 px-4 rounded-lg">
                        <span class="text-primary font-normal">Próximo pago</span>
                        <span class="text-primary font-bold">15 Feb 2026</span>
                    </div>
                </div>
                <div
                    class="mt-6 flex items-center justify-center gap-1.5 text-label-sm font-label-sm text-on-surface-variant/70 bg-surface-bright py-2 rounded-full border border-surface-container">
                    <span class="material-symbols-outlined text-[16px] opacity-80">mail</span>
                    <span>Enviamos el resumen a tu correo</span>
                </div>
            </div>
            <!-- Action Buttons (Sticky-ish to bottom) -->
            <div class="mt-8 flex flex-col gap-4">
                <!-- Primary Action -->
                <button
                    class="w-full min-h-[48px] rounded-full bg-secondary-container text-on-secondary-container font-label-md text-label-md flex items-center justify-center gap-2 shadow-[0px_8px_30px_rgba(0,51,102,0.12)] hover:bg-secondary-fixed active:scale-95 transition-all duration-200">
                    Ir a Mi seguro
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </button>
                <!-- Secondary Action -->
                <button
                    class="w-full min-h-[48px] rounded-full border-[1.5px] border-primary text-primary bg-transparent font-label-md text-label-md flex items-center justify-center hover:bg-primary-fixed/20 active:scale-95 transition-all duration-200">
                    Descargar póliza PDF
                </button>
            </div>
